version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ironbody-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ironbody}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ironbody_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ironbody}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironbody -d ironbody"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
